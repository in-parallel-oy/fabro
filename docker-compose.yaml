services:
  fabro:
    image: ghcr.io/in-parallel-oy/fabro:${FABRO_VERSION:-nightly}
    restart: unless-stopped
    ports:
      - "${FABRO_PORT:-32276}:32276"
    volumes:
      - fabro-storage:/storage
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:32276/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  fabro-storage:
